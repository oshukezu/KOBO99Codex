<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kobo 99 元選書行事曆</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --panel: #ffffff;
      --text: #232323;
      --muted: #64605a;
      --line: #ddd7cc;
      --accent: #0f6c5a;
      --accent-dark: #0a4f42;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 48px auto;
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 4vw, 3rem);
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      min-width: 240px;
    }
    .button {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }
    .button.secondary {
      background: transparent;
      color: var(--accent-dark);
      border: 1px solid var(--line);
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: 0; }
    td:first-child { width: 132px; color: var(--muted); }
    a { color: var(--accent-dark); }
    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    @media (max-width: 720px) {
      main { margin: 28px auto; }
      header { display: block; }
      .actions { justify-content: flex-start; margin-top: 18px; }
      table, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--line); padding: 12px 0; }
      tr:last-child { border-bottom: 0; }
      td { border: 0; padding: 4px 16px; }
      td:first-child { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Kobo 99 元選書行事曆</h1>
        <p>每週三 22:00（台北時間）更新，來源為 Kobo 公開部落格文章。</p>
      </div>
      <nav class="actions" aria-label="訂閱連結">
        <a class="button" id="google-link" href="https://calendar.google.com/calendar/render">Google Calendar 訂閱</a>
        <a class="button secondary" href="kobo99.ics">下載 ICS</a>
        <a class="button secondary" href="events.json">查看 JSON</a>
      </nav>
    </header>
    <section aria-label="近期選書">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>書名</th>
            <th>來源</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><time datetime="2026-05-20">2026-05-20</time></td>
            <td><a href="https://www.kobo.com/tw/zh/ebook/T7mHfPqfoDOEcaipd5PpsA?sId=db29fa10-4f6f-4319-8aa8-af015ed02287&amp;ssId=1pK39OA0Z3F998WYupKHX&amp;cPos=1&amp;utm_source=twblog&amp;utm_medium=99list&amp;utm_campaign=coin99_20260514">吃飯沒？：探訪全球中餐館:關於移民、飲食與文化認同的故事</a></td>
            <td><a href="https://www.kobo.com/zh/blog/weekly-dd99-2026-w20">來源文章</a></td>
          </tr>
        </tbody>
      </table>
    </section>
    <footer>最後產生時間：2026-05-20 23:42:08 CST</footer>
  </main>
  <script>
    const icsUrl = new URL("kobo99.ics", window.location.href).href;
    document.getElementById("google-link").href =
      "https://calendar.google.com/calendar/render?cid=" + encodeURIComponent(icsUrl);
  </script>
</body>
</html>
